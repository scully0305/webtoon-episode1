  <style>
    :root {
      --bg: #f3efe8;
      --paper: #fffdf9;
      --ink: #2f2a26;
      --muted: #7c736b;
      --shadow: 0 14px 36px rgba(47, 42, 38, 0.12);
      --border: rgba(90, 76, 63, 0.12);
      --maxw: 780px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: linear-gradient(to bottom, #f6f2ec 0%, #f1ede6 100%);
      color: var(--ink);
      font-family: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(243, 239, 232, 0.82);
      border-bottom: 1px solid rgba(90, 76, 63, 0.08);
    }
    .topbar-inner {
      width: min(100%, var(--maxw) + 32px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }
    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .series-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .episode-title {
      font-size: 13px;
      color: var(--muted);
    }
    .top-link {
      color: var(--ink);
      text-decoration: none;
      font-size: 13px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
    }
    .page {
      width: min(100%, var(--maxw));
      margin: 0 auto;
      padding: 20px 12px 72px;
    }
    .hero {
      margin: 10px 0 28px;
      padding: 28px 22px;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .hero .kicker {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: -0.04em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .scroll-note {
      margin: 0 0 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .panel {
      margin: 0;
      width: 100%;
    }
    .panel img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      background: white;
    }
    .scene-gap-s { height: 48px; }
    .scene-gap-m { height: 80px; }
    .scene-gap-l { height: 140px; }
    .scene-gap-xl { height: 220px; }
    .scene-gap-xxl { height: 320px; }
    .breath { height: 24px; }
    .footer {
      width: min(100%, var(--maxw));
      margin: 32px auto 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      padding: 0 16px;
    }
    @media (max-width: 640px) {
      .hero h1 { font-size: 28px; }
      .page { padding-left: 8px; padding-right: 8px; }
      .panel img { border-radius: 14px; }
    }
  </style>
